<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 14</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
            
        }

        th.cor {
            background-color: gray;
            color: white;
        }

        th.cor2 {
            background-color: gray;
            color: white;
            text-align: left;
        }

        #t1, #t2 {
            text-align: left;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        .mov {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        .grey {
            background-color: gray;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col" class="cor">Área</th>
                <th rowspan="2" scope="col" class="cor">Disciplinas</th>
                <th colspan="2" scope="colgroup" class="cor">Notas</th>
                <th rowspan="2" scope="col" class="cor">Média</th>
            </tr>
            <tr>
                <th class="cor" scope="col">Nota 1</th>
                <th class="cor" scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
            </tr>
            <tr>
                <th colspan="4" scope="row" class="cor2">Média de Exatas</th>
                <td class="grey">0.0</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
            </tr>
            <tr>
                <td>Geaografia</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>
                <td class="mov">0.0</td>   
            </tr>
            <tr>
                <th colspan="4" scope="row" class="cor2">Média de Humanas</th>
                <td class="grey">0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
