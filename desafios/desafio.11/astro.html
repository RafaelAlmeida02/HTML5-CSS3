<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço</title>
    <style>
        * {
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
}

/* Fundo do espaço */
body {
    background-image: url("espaco.jpg");
    background-size: cover;      /* ocupa toda a tela */
    background-position: center;
    background-repeat: no-repeat;

    position: relative; /* referência para o astronauta */
}

/* Astronauta centralizado */
#astro {
    position: absolute;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    width: 48%; /* ajuste livre */
    max-width: 465px;
}

    </style>
</head>
<body>
    <img src="astronauta.png" alt="astronauta" id="astro">
</body>
</html>
