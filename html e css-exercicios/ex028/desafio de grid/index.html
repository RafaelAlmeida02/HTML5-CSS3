<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-rows: 80px 40px 1fr 40px;
            grid-template-columns: 1fr 150px;
            gap: 5px;
        }

        header {
            background-color: red;
            grid-row: 1 / 2;
            grid-column: 1 / 3;
        }

        nav {
            background-color: green;
            grid-row: 2 / 3;
            grid-column: 1 / 3;
        }

        main {
            background-color: blue;
            grid-row: 3 / 4;
            grid-column: 1 / 2;
        }

        section {
            background-color: grey;
            grid-row: 3 / 4;
            grid-column: 2 / 3;
        }

        footer {
            background-color: yellow;
            grid-row: 4 / 5;
            grid-column: 1 / 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>topo</header>
        <nav>menu</nav>
        <main>conteúdo principal</main>
        <section>seção</section>
        <footer>rodapé</footer>
    </div>
</body>
</html>
